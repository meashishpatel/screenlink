<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ScreenLink">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E78DC"/>
      <stop offset="1" stop-color="#1B4DA8"/>
    </linearGradient>
  </defs>
  <!-- Blue rounded tile -->
  <rect x="3.84" y="3.84" width="56.32" height="56.32" rx="14.08" fill="url(#tile)"/>
  <!-- Back screen -->
  <rect x="9.28" y="9.28" width="32.64" height="32.64" rx="3.84" fill="#ffffff"/>
  <!-- Separation halo (front screen grown by the gap, painted in the tile gradient) -->
  <rect x="18.88" y="18.88" width="39.04" height="39.04" rx="7.04" fill="url(#tile)"/>
  <!-- Front screen -->
  <rect x="22.08" y="22.08" width="32.64" height="32.64" rx="3.84" fill="#ffffff"/>
</svg>
