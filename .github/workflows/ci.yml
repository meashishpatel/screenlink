name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Full build incl. the egui GUI, plus lint/format. Windows is the primary target.
  windows:
    name: Windows (full + lint)
    runs-on: windows-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets
      - name: Build
        run: cargo build --workspace --release
      - name: Test
        # --test-threads=1 avoids a teardown race between the loopback test's
        # TLS/UDP runtime drop and other tests dropping in parallel — manifests
        # as STATUS_HEAP_CORRUPTION on Windows.
        run: cargo test --workspace -- --test-threads=1

  # Cross-platform compile-check + tests for the shared/headless code (transport,
  # protocol, crypto, input abstraction, and the loopback integration test). The
  # GUI is skipped here (--no-default-features) to avoid desktop system-lib setup.
  cross:
    name: ${{ matrix.os }} (headless)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux input deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxdo-dev libx11-dev libxtst-dev libxi-dev libxkbcommon-dev libevdev-dev
      # Headless build still compiles the Unix input backend (enigo injection),
      # so cross-platform input code is compile-checked here even without the GUI.
      - name: Build (headless)
        run: cargo build --workspace --no-default-features
      - name: Test (headless, incl. loopback)
        run: cargo test --workspace --no-default-features -- --test-threads=1
