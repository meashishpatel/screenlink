name: Release

# Push a version tag to build and publish downloadable binaries:
#   git tag v0.1.0
#   git push origin v0.1.0
# GitHub Actions then builds the installer + standalone .exe and attaches them to
# a GitHub Release for that tag. You never build locally.
#
# `workflow_dispatch` lets you do a dry run (builds artifacts, no Release).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version for a manual dry run, e.g. 0.1.0"
        required: false

permissions:
  contents: write # needed to create the Release

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & publish Windows binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if (-not $v) { $v = "${{ github.ref_name }}".TrimStart('v') }
          if (-not $v) { $v = "0.0.0" }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v"

      - name: Build release binary
        run: cargo build --release -p screenlink-app

      # Optional code signing — set repo secrets CODE_SIGN_PFX_BASE64 +
      # CODE_SIGN_PASSWORD to avoid SmartScreen warnings. Skipped if unset.
      - name: Sign binary
        if: ${{ secrets.CODE_SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        env:
          CODE_SIGN_PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CODE_SIGN_PFX_BASE64))
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1
          & $st.FullName sign /fd SHA256 /f cert.pfx /p $env:CODE_SIGN_PASSWORD `
            /tr http://timestamp.digicert.com /td SHA256 target\release\screenlink.exe

      - name: Package standalone exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\screenlink.exe "dist\ScreenLink-${{ steps.ver.outputs.version }}-x64.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc /DAppVersion=${{ steps.ver.outputs.version }} installer\screenlink.iss

      - name: Collect installer
        shell: pwsh
        run: Copy-Item installer\Output\*.exe dist\

      # Always expose the builds as workflow artifacts (useful for dry runs).
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenlink-${{ steps.ver.outputs.version }}
          path: dist/*.exe

      # On a tag push, publish a GitHub Release with the binaries attached.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          body: |
            ## ScreenLink ${{ steps.ver.outputs.version }}

            **Download:**
            - `ScreenLink-Setup-${{ steps.ver.outputs.version }}.exe` — installer (adds firewall rules, Start-menu entry).
            - `ScreenLink-${{ steps.ver.outputs.version }}-x64.exe` — standalone, no install.

            > Windows 10 (2004+) / 11, x64. On first run, allow it through the firewall on **Private** networks.
            > If the binary is unsigned, SmartScreen may warn — click *More info → Run anyway*, or sign the build (see README §8).
