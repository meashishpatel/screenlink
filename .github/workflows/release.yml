name: Release

# Push a version tag to build and publish downloadable binaries for all platforms:
#   git tag v0.1.0
#   git push origin v0.1.0
# Each job attaches its build to the GitHub Release for that tag. You never build
# locally. `workflow_dispatch` does a dry run (artifacts only, no Release).
#
# Windows builds are first-class; Linux/macOS builds are EXPERIMENTAL (the host/
# client input paths need on-device verification) and labeled as such.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version for a manual dry run, e.g. 0.1.0"
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---- Windows: installer + standalone exe (first-class) ----
  windows:
    name: Windows
    runs-on: windows-latest
    env:
      CODE_SIGN_PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
      CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if (-not $v) { $v = "${{ github.ref_name }}".TrimStart('v') }
          if (-not $v) { $v = "0.0.0" }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build release binary
        # --features extend enables real screen capture (Desktop Duplication) so
        # the Windows builds can mirror the actual screen, not just the test pattern.
        run: cargo build --release -p screenlink-app --features extend

      - name: Sign binary
        if: ${{ env.CODE_SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CODE_SIGN_PFX_BASE64))
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1
          & $st.FullName sign /fd SHA256 /f cert.pfx /p $env:CODE_SIGN_PASSWORD `
            /tr http://timestamp.digicert.com /td SHA256 target\release\screenlink.exe

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\screenlink.exe "dist\ScreenLink-${{ steps.ver.outputs.version }}-x64.exe"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        run: iscc /DAppVersion=${{ steps.ver.outputs.version }} installer\screenlink.iss
      - name: Collect installer
        shell: pwsh
        run: Copy-Item installer\Output\*.exe dist\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenlink-windows-${{ steps.ver.outputs.version }}
          path: dist/*.exe

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          body: |
            ## ScreenLink ${{ steps.ver.outputs.version }}

            ### Windows (recommended)
            - `ScreenLink-Setup-${{ steps.ver.outputs.version }}.exe` — installer (adds firewall rules + Start-menu entry).
            - `ScreenLink-${{ steps.ver.outputs.version }}-x64.exe` — standalone, no install.

            ### Linux / macOS (experimental)
            - `ScreenLink-${{ steps.ver.outputs.version }}-linux-x64.tar.gz`
            - `ScreenLink-${{ steps.ver.outputs.version }}-macos-arm64.tar.gz`

            > Linux/macOS builds are **experimental** and need on-device verification.
            > Linux requires an **X11** session (not Wayland); macOS requires **Accessibility
            > + Input Monitoring** permission, and unsigned apps need right-click → **Open**
            > (or `xattr -dr com.apple.quarantine ./screenlink`) to clear Gatekeeper.
            > Unsigned Windows binaries may trip SmartScreen — **More info → Run anyway**.

  # ---- Linux + macOS: full GUI build, packaged as a tarball (experimental) ----
  unix:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: linux-x64
          - os: macos-latest
            asset: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI + input deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev libgl1-mesa-dev \
            libxdo-dev libx11-dev libxtst-dev libxi-dev libxkbcommon-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev

      - name: Determine version
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          [ -z "$V" ] && V="${GITHUB_REF_NAME#v}"
          [ -z "$V" ] && V="0.0.0"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build release binary (full GUI)
        run: cargo build --release -p screenlink-app

      - name: Package tarball
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/release -czf \
            "dist/ScreenLink-${{ steps.ver.outputs.version }}-${{ matrix.asset }}.tar.gz" screenlink

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenlink-${{ matrix.asset }}-${{ steps.ver.outputs.version }}
          path: dist/*.tar.gz

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
